<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Akino Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-container {
      max-width: 420px;
      width: 100%;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 2rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      position: relative;
    }
    /* Tombol kembali */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #a0a0a0;
      text-decoration: none;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      transition: color 0.3s;
    }
    .back-link:hover { color: #3B82F6; }

    .auth-container .logo {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    .auth-container .logo i { color: #3B82F6; }
    .auth-container .logo span { color: #3B82F6; }
    .auth-container .sub {
      text-align: center;
      color: #a0a0a0;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .auth-container .tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 1.5rem;
    }
    .auth-container .tabs button {
      flex: 1;
      padding: 0.6rem;
      background: none;
      border: none;
      color: #a0a0a0;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .auth-container .tabs button.active {
      color: #f0f0f0;
      border-bottom-color: #3B82F6;
    }
    .auth-container .tabs button:hover { color: #f0f0f0; }

    .auth-form {
      display: none;
      flex-direction: column;
      gap: 1rem;
    }
    .auth-form.active { display: flex; }

    .auth-form .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .auth-form .form-group label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #a0a0a0;
    }
    .auth-form .form-group input {
      padding: 0.7rem 1rem;
      border-radius: 8px;
      background: #1f1f1f;
      border: 1px solid rgba(255,255,255,0.06);
      color: #f0f0f0;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.3s;
      font-family: 'Inter', sans-serif;
    }
    .auth-form .form-group input:focus { border-color: #3B82F6; }
    .auth-form .form-group input::placeholder { color: #6b6b6b; }

    .auth-form .btn-submit {
      padding: 0.8rem;
      border-radius: 8px;
      background: #3B82F6;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }
    .auth-form .btn-submit:hover { background: #2563eb; }
    .auth-form .btn-submit:disabled { opacity:0.6; cursor:not-allowed; }

    .auth-form .error-msg {
      color: #ef4444;
      font-size: 0.8rem;
      text-align: center;
      min-height: 20px;
    }
    .auth-form .success-msg {
      color: #22c55e;
      font-size: 0.8rem;
      text-align: center;
    }

    /* 🔥 Tombol Google dengan SVG resmi */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.7rem;
      border-radius: 8px;
      background: #1f1f1f;
      border: 1px solid rgba(255,255,255,0.06);
      color: #f0f0f0;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      font-family: 'Inter', sans-serif;
    }
    .btn-google:hover {
      background: #2a2a2a;
      border-color: rgba(255,255,255,0.15);
    }
    .btn-google svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: #6b6b6b;
      font-size: 0.75rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    .toast-container {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .toast {
      padding: 0.8rem 1.5rem;
      background: #1f1f1f;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      animation: slideIn 0.3s ease;
      font-size: 0.85rem;
    }
    .toast i { color: #3B82F6; }
    .toast.error i { color: #ef4444; }
    .toast.success i { color: #22c55e; }
    @keyframes slideIn {
      from { opacity:0; transform:translateX(50px); }
      to { opacity:1; transform:translateX(0); }
    }
    @media (max-width:480px) {
      .auth-container { padding:1.5rem 1rem; }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <!-- Tombol Kembali ke Manga -->
    <a href="manga.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Manga</a>

    <div class="logo"><i class="fas fa-store"></i> Akino<span>Store</span></div>
    <div class="sub">Masuk atau daftar untuk menyimpan bookmark</div>

    <div class="tabs">
      <button class="active" data-tab="login">Login</button>
      <button data-tab="register">Daftar</button>
    </div>

    <!-- Login Form -->
    <form class="auth-form active" id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="email@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Masukkan password" required />
      </div>
      <div class="error-msg" id="loginError"></div>
      <button type="submit" class="btn-submit" id="loginBtn">Login</button>
    </form>

    <!-- Register Form -->
    <form class="auth-form" id="registerForm">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="registerName" placeholder="Nama kamu" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="registerEmail" placeholder="email@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="registerPassword" placeholder="Minimal 6 karakter" required />
      </div>
      <div class="error-msg" id="registerError"></div>
      <div class="success-msg" id="registerSuccess"></div>
      <button type="submit" class="btn-submit" id="registerBtn">Daftar</button>
    </form>

    <!-- Divider -->
    <div class="divider">atau</div>

    <!-- 🔥 Tombol Login dengan Google - Logo SVG Resmi -->
    <button type="button" class="btn-google" id="googleLoginBtn">
      <svg viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.97-5.97z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Login dengan Google
    </button>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ============================================================
    // TOAST
    // ============================================================
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { info:'fa-info-circle', success:'fa-check-circle', error:'fa-exclamation-circle' };
      toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(50px)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // ============================================================
    // TABS (Login / Register)
    // ============================================================
    document.querySelectorAll('.tabs button').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');

        const tab = this.dataset.tab;
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        document.getElementById(tab + 'Form').classList.add('active');

        document.getElementById('loginError').textContent = '';
        document.getElementById('registerError').textContent = '';
        document.getElementById('registerSuccess').textContent = '';
      });
    });

    // ============================================================
    // REGISTER (Tanpa reCAPTCHA)
    // ============================================================
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value.trim();
      const errorEl = document.getElementById('registerError');
      const successEl = document.getElementById('registerSuccess');

      if (!name || !email || !password) {
        errorEl.textContent = 'Semua field harus diisi!';
        return;
      }
      if (password.length < 6) {
        errorEl.textContent = 'Password minimal 6 karakter!';
        return;
      }

      try {
        await registerWithEmail(email, password, name);
        successEl.textContent = 'Registrasi berhasil! Silakan login.';
        errorEl.textContent = '';

        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="login"]').classList.add('active');
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('loginEmail').value = email;

        showToast('Registrasi berhasil! Silakan login.', 'success');
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });

    // ============================================================
    // LOGIN (Tanpa reCAPTCHA)
    // ============================================================
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const errorEl = document.getElementById('loginError');

      if (!email || !password) {
        errorEl.textContent = 'Email dan password harus diisi!';
        return;
      }

      try {
        const user = await loginWithEmail(email, password);
        saveSession(user);
        showToast('Login berhasil!', 'success');
        setTimeout(() => {
          // Redirect ke halaman sebelumnya jika ada, atau ke profile
          const params = new URLSearchParams(window.location.search);
          const returnUrl = params.get('return');
          if (returnUrl) {
            window.location.href = decodeURIComponent(returnUrl);
          } else {
            window.location.href = 'profile.html';
          }
        }, 500);
      } catch (err) {
        errorEl.textContent = 'Email atau password salah!';
      }
    });

    // ============================================================
    // LOGIN DENGAN GOOGLE
    // ============================================================
    document.getElementById('googleLoginBtn').addEventListener('click', async function() {
      try {
        const user = await loginWithGoogle();
        saveSession(user);
        showToast('Login dengan Google berhasil!', 'success');
        setTimeout(() => {
          const params = new URLSearchParams(window.location.search);
          const returnUrl = params.get('return');
          if (returnUrl) {
            window.location.href = decodeURIComponent(returnUrl);
          } else {
            window.location.href = 'profile.html';
          }
        }, 500);
      } catch (err) {
        console.error('Google login error:', err);
        let msg = 'Gagal login dengan Google. ';
        if (err.code === 'auth/unauthorized-domain') {
          msg += 'Domain tidak diizinkan. Tambahkan domain ke Firebase Console → Authentication → Settings → Authorized domains.';
        } else {
          msg += err.message;
        }
        showToast(msg, 'error');
      }
    });
  </script>

</body>
</html>
